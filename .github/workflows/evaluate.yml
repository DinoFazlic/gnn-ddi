name: Evaluate Submission

on:
  pull_request_target:
    paths:
      # New inbox-based layout
      - 'submissions/inbox/**/*.csv'
      # Legacy flat layout (backward compatibility)
      - 'submissions/*.csv'
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------
      # 1. Checkout main (safe base for pull_request_target)
      # ----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch PR changes
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-branch
          git checkout pr-branch -- submissions/ || echo "No submission changes in PR"

      # ----------------------------------------------------------
      # 2. Python environment
      # ----------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ----------------------------------------------------------
      # 3. Resolve ground-truth labels
      #    Priority: GitHub Secret → private repo fallback
      # ----------------------------------------------------------
      - name: Inject labels from secret
        if: ${{ env.TEST_LABELS_CSV != '' }}
        env:
          TEST_LABELS_CSV: ${{ secrets.TEST_LABELS_CSV }}
        run: |
          echo "$TEST_LABELS_CSV" | base64 --decode > data/test_labels.csv
          echo "✅ Labels injected from GitHub Secret"

      - name: Fallback — fetch labels from private repo
        if: ${{ env.TEST_LABELS_CSV == '' }}
        env:
          TEST_LABELS_CSV: ${{ secrets.TEST_LABELS_CSV }}
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          if [ -z "$PRIVATE_REPO_TOKEN" ]; then
            echo "❌ No labels secret and no PRIVATE_REPO_TOKEN — cannot score."
            exit 1
          fi
          git clone --depth 1 https://${PRIVATE_REPO_TOKEN}@github.com/muuki2/gnn-ddi-private.git private_data
          cp private_data/test_labels.csv data/test_labels.csv
          rm -rf private_data
          echo "✅ Labels fetched from private repo"

      # ----------------------------------------------------------
      # 4. Find the submission file
      # ----------------------------------------------------------
      - name: Locate submission
        id: find_submission
        run: |
          # Prefer new inbox layout, fall back to flat
          SUBMISSION=$(git diff --name-only main...pr-branch \
            | grep -E 'submissions/(inbox/.+/predictions\.csv|[^/]+\.csv)' \
            | head -n 1)
          if [ -z "$SUBMISSION" ]; then
            echo "❌ No CSV submission found in PR"
            exit 1
          fi
          echo "submission_file=$SUBMISSION" >> $GITHUB_OUTPUT
          echo "Found submission: $SUBMISSION"

          # Derive team name from path
          if echo "$SUBMISSION" | grep -q 'inbox/'; then
            TEAM=$(echo "$SUBMISSION" | sed -E 's|submissions/inbox/([^/]+)/.*|\1|')
          else
            TEAM=$(basename "$SUBMISSION" .csv)
          fi
          echo "team=$TEAM" >> $GITHUB_OUTPUT
          echo "Team: $TEAM"

      # ----------------------------------------------------------
      # 5. Check one-submission-per-team limit
      # ----------------------------------------------------------
      - name: Enforce one submission per team
        env:
          TEAM: ${{ steps.find_submission.outputs.team }}
        run: |
          python -c "
          import sys, pathlib
          sys.path.insert(0, '.')
          from competition.render_leaderboard import load_leaderboard_csv
          rows = load_leaderboard_csv(pathlib.Path('leaderboard/leaderboard.csv'))
          team = '$TEAM'.lower()
          existing = [r for r in rows if str(r.get('team','')).lower() == team]
          if existing:
              print(f'❌ Team \"{team}\" already has a submission on the leaderboard.')
              print('   Each team is limited to one submission.')
              sys.exit(1)
          print(f'✅ No prior submission for \"{team}\" — proceeding.')
          "

      # ----------------------------------------------------------
      # 6. Validate
      # ----------------------------------------------------------
      - name: Validate submission
        run: |
          python -m competition.validate_submission \
            "${{ steps.find_submission.outputs.submission_file }}" \
            data/public/test.csv

      # ----------------------------------------------------------
      # 7. Score
      # ----------------------------------------------------------
      - name: Evaluate submission
        id: score
        run: |
          python -m competition.evaluate \
            "${{ steps.find_submission.outputs.submission_file }}" \
            --labels data/test_labels.csv \
            --test-ids data/public/test.csv \
            --output-json _results.json \
            | tee scoring_output.txt

          SCORE=$(grep "^SCORE:" scoring_output.txt | cut -d':' -f2)
          echo "score=$SCORE" >> $GITHUB_OUTPUT

          # Capture optional secondary metrics
          EFF=$(grep "^EFFICIENCY:" scoring_output.txt | cut -d':' -f2 || echo "")
          PARAMS=$(grep "^PARAMS:" scoring_output.txt | cut -d':' -f2 || echo "")
          TIME=$(grep "^TIME_MS:" scoring_output.txt | cut -d':' -f2 || echo "")
          CLIFF=$(grep "^CLIFF_ACC:" scoring_output.txt | cut -d':' -f2 || echo "")
          echo "efficiency=$EFF" >> $GITHUB_OUTPUT
          echo "params=$PARAMS" >> $GITHUB_OUTPUT
          echo "time_ms=$TIME" >> $GITHUB_OUTPUT
          echo "cliff_acc=$CLIFF" >> $GITHUB_OUTPUT

          # Extract submission_type from metadata.json (if present)
          SUB_DIR=$(dirname "${{ steps.find_submission.outputs.submission_file }}")
          META_FILE="$SUB_DIR/metadata.json"
          if [ -f "$META_FILE" ]; then
            STYPE=$(python -c "import json; m=json.load(open('$META_FILE')); print(m.get('submission_type',''))" 2>/dev/null || echo "")
          else
            STYPE=""
          fi
          echo "submission_type=$STYPE" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------
      # 8. Update leaderboard
      # ----------------------------------------------------------
      - name: Update leaderboard CSV & render
        env:
          TEAM: ${{ steps.find_submission.outputs.team }}
          SCORE: ${{ steps.score.outputs.score }}
          EFF: ${{ steps.score.outputs.efficiency }}
          PARAMS: ${{ steps.score.outputs.params }}
          TIME_MS: ${{ steps.score.outputs.time_ms }}
          CLIFF: ${{ steps.score.outputs.cliff_acc }}
          STYPE: ${{ steps.score.outputs.submission_type }}
        run: |
          python -c "
          import sys, pathlib
          sys.path.insert(0, '.')
          from competition.render_leaderboard import (
              load_leaderboard_csv, save_leaderboard_csv, upsert_entry,
              render_markdown, update_docs_js, _sort_and_rank,
          )
          import os

          csv_path = pathlib.Path('leaderboard/leaderboard.csv')
          md_path  = pathlib.Path('leaderboard/leaderboard.md')

          rows = load_leaderboard_csv(csv_path)
          rows = upsert_entry(
              rows,
              team=os.environ['TEAM'],
              macro_f1=float(os.environ['SCORE']),
              efficiency=float(os.environ['EFF']) if os.environ.get('EFF') else None,
              params=int(os.environ['PARAMS']) if os.environ.get('PARAMS') else None,
              time_ms=float(os.environ['TIME_MS']) if os.environ.get('TIME_MS') else None,
              cliff_accuracy=float(os.environ['CLIFF']) if os.environ.get('CLIFF') else None,
              submission_type=os.environ.get('STYPE') or None,
          )
          save_leaderboard_csv(csv_path, rows)
          md_path.write_text(render_markdown(rows))
          update_docs_js(rows)
          print(f'Leaderboard updated: {len(rows)} entries')
          "

      # ----------------------------------------------------------
      # 9. Commit & push
      # ----------------------------------------------------------
      - name: Commit leaderboard update
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "actions@github.com"
          git checkout main
          git add leaderboard/ docs/leaderboard.js
          if git diff --staged --quiet; then
            echo "No leaderboard changes to commit"
          else
            git commit -m "🏆 Leaderboard: ${{ steps.find_submission.outputs.team }} — F1=${{ steps.score.outputs.score }}"
            git push origin main
          fi

      # ----------------------------------------------------------
      # 10. Comment on PR
      # ----------------------------------------------------------
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const score = '${{ steps.score.outputs.score }}';
            const team  = '${{ steps.find_submission.outputs.team }}';
            const sub   = '${{ steps.find_submission.outputs.submission_file }}';
            const eff   = '${{ steps.score.outputs.efficiency }}';
            const cliff = '${{ steps.score.outputs.cliff_acc }}';

            let extras = '';
            if (eff) extras += `| Efficiency | ${parseFloat(eff).toFixed(4)} |\n`;
            if (cliff) extras += `| Cliff Accuracy | ${parseFloat(cliff).toFixed(4)} |\n`;

            const body = `## 🎯 Submission Evaluation Results

            **Team:** @${team}
            **File:** \`${sub}\`

            ---

            | Metric | Value |
            |--------|-------|
            | **Macro F1** | **${parseFloat(score).toFixed(4)}** |
            ${extras}

            ✅ The [leaderboard](../blob/main/leaderboard/leaderboard.md) has been updated.

            ---

            *Tips: Try different architectures, tune hyperparameters, handle class imbalance.*
            *See the [interactive leaderboard](https://muuki2.github.io/gnn-ddi/leaderboard.html) for full rankings.* 🚀`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
